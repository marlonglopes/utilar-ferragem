name: Go CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'pkg/**'
      - 'go.work'
      - '.github/workflows/go-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'pkg/**'
      - 'go.work'

jobs:
  build-and-test:
    name: Build · Vet · Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        module:
          - pkg
          - services/auth-service
          - services/catalog-service
          - services/order-service
          - services/payment-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Build
        run: go build ./...
        working-directory: ${{ matrix.module }}

      - name: Vet
        run: go vet ./...
        working-directory: ${{ matrix.module }}

      - name: Test (skip integration that need DB)
        run: go test -short ./...
        working-directory: ${{ matrix.module }}

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    needs: build-and-test

    strategy:
      matrix:
        module:
          - pkg
          - services/auth-service
          - services/catalog-service
          - services/order-service
          - services/payment-service

    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
        working-directory: ${{ matrix.module }}

  gosec:
    name: gosec (SAST)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Run gosec
        # Excludes:
        # G104: errors not checked (intentional in fire-and-forget paths like audit log)
        # G115: integer overflow conversion (false positives em status codes)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -exclude=G104,G115 -fmt=sarif -out=gosec.sarif ./services/... ./pkg/... || true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec.sarif
        continue-on-error: true
