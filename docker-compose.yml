services:
  postgres-payment:
    image: postgres:16-alpine
    container_name: utilar_payment_db
    environment:
      POSTGRES_USER: utilar
      POSTGRES_PASSWORD: utilar
      POSTGRES_DB: payment_service
    ports:
      - "5435:5432"
    volumes:
      - payment_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utilar -d payment_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v23.3.11
    container_name: utilar_redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    ports:
      - "19092:19092"
      - "18082:18082"
      - "18081:18081"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 15s
      timeout: 10s
      retries: 10

  redpanda-console:
    image: redpandadata/console:v2.4.3
    container_name: utilar_redpanda_console
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
    volumes:
      - ./scripts/redpanda-console-config.yml:/tmp/config.yml:ro

volumes:
  payment_pg_data:
  redpanda_data:
