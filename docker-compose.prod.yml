# Produção — os 4 serviços Go + Redis + Redpanda + nginx numa EC2.
# O banco é EXTERNO (RDS), configurado via .env (NÃO commitado). Ver deploy/env.prod.example.
#
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# SPA NÃO está aqui — vai pra S3+CloudFront via scripts/deploy.sh production.

x-svc-common: &svc-common
  restart: unless-stopped
  networks: [utilar]
  environment: &svc-env
    DEV_MODE: "false"
    JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
    ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?set ALLOWED_ORIGINS}
    REDIS_URL: redis://redis:6379

services:
  catalog:
    <<: *svc-common
    build: { context: ., args: { SERVICE: catalog-service } }
    image: ${ECR_REGISTRY:-utilar}/catalog:${TAG:-latest}
    environment:
      <<: *svc-env
      # A1 (auditoria 2026-07-18) — SERVICE_JWT_SECRET é DELIBERADAMENTE
      # entregue só a catalog, order e auth. Ele autentica tráfego máquina-a-
      # máquina (role=service) e é distinto do JWT_SECRET de usuário. O
      # assistant (Lara/Alice) e o payment NÃO o recebem: a Lara é o serviço
      # mais exposto (endpoint público, texto livre → LLM) e não precisa emitir
      # nem verificar token de serviço. Não mova esta linha para o *svc-env
      # compartilhado — o valor da mitigação está exatamente na distribuição
      # restrita.
      SERVICE_JWT_SECRET: ${SERVICE_JWT_SECRET:?set SERVICE_JWT_SECRET}
      CATALOG_DB_URL: postgres://${DB_USER}:${DB_PASSWORD}@${RDS_HOST}:5432/catalog_service?sslmode=require
    depends_on: [redis]

  order:
    <<: *svc-common
    build: { context: ., args: { SERVICE: order-service } }
    image: ${ECR_REGISTRY:-utilar}/order:${TAG:-latest}
    environment:
      <<: *svc-env
      # A1 (auditoria 2026-07-18) — SERVICE_JWT_SECRET é DELIBERADAMENTE
      # entregue só a catalog, order e auth. Ele autentica tráfego máquina-a-
      # máquina (role=service) e é distinto do JWT_SECRET de usuário. O
      # assistant (Lara/Alice) e o payment NÃO o recebem: a Lara é o serviço
      # mais exposto (endpoint público, texto livre → LLM) e não precisa emitir
      # nem verificar token de serviço. Não mova esta linha para o *svc-env
      # compartilhado — o valor da mitigação está exatamente na distribuição
      # restrita.
      SERVICE_JWT_SECRET: ${SERVICE_JWT_SECRET:?set SERVICE_JWT_SECRET}
      ORDER_DB_URL: postgres://${DB_USER}:${DB_PASSWORD}@${RDS_HOST}:5432/order_service?sslmode=require
      CATALOG_SERVICE_URL: http://catalog:8091
      # Sem isto o consumer de pagamento não sobe e o pedido nunca sai de
      # pending_payment depois que o cliente paga.
      KAFKA_BROKERS: redpanda:9092
    depends_on: [redis, catalog, redpanda]

  auth:
    <<: *svc-common
    build: { context: ., args: { SERVICE: auth-service } }
    image: ${ECR_REGISTRY:-utilar}/auth:${TAG:-latest}
    environment:
      <<: *svc-env
      # A1 (auditoria 2026-07-18) — SERVICE_JWT_SECRET é DELIBERADAMENTE
      # entregue só a catalog, order e auth. Ele autentica tráfego máquina-a-
      # máquina (role=service) e é distinto do JWT_SECRET de usuário. O
      # assistant (Lara/Alice) e o payment NÃO o recebem: a Lara é o serviço
      # mais exposto (endpoint público, texto livre → LLM) e não precisa emitir
      # nem verificar token de serviço. Não mova esta linha para o *svc-env
      # compartilhado — o valor da mitigação está exatamente na distribuição
      # restrita.
      SERVICE_JWT_SECRET: ${SERVICE_JWT_SECRET:?set SERVICE_JWT_SECRET}
      AUTH_DB_URL: postgres://${DB_USER}:${DB_PASSWORD}@${RDS_HOST}:5432/auth_service?sslmode=require
    depends_on: [redis]

  payment:
    <<: *svc-common
    build: { context: ., args: { SERVICE: payment-service } }
    image: ${ECR_REGISTRY:-utilar}/payment:${TAG:-latest}
    environment:
      <<: *svc-env
      PAYMENT_DB_URL: postgres://${DB_USER}:${DB_PASSWORD}@${RDS_HOST}:5432/payment_service?sslmode=require
      REDPANDA_BROKERS: redpanda:9092
      ORDER_SERVICE_URL: http://order:8092
      AUTH_SERVICE_URL: http://auth:8093
      PSP_PROVIDER: ${PSP_PROVIDER:-appmax}
      APPMAX_ACCESS_TOKEN: ${APPMAX_ACCESS_TOKEN:-}
      APPMAX_BASE_URL: ${APPMAX_BASE_URL:-}
      APPMAX_WEBHOOK_SECRET: ${APPMAX_WEBHOOK_SECRET:-}
    depends_on: [redis, redpanda, order, auth]

  assistant:
    <<: *svc-common
    build: { context: ., args: { SERVICE: assistant-service } }
    image: ${ECR_REGISTRY:-utilar}/assistant:${TAG:-latest}
    environment:
      <<: *svc-env
      CATALOG_SERVICE_URL: http://catalog:8091
      # Vazio = Lara em MODO MOCK (regras + busca real). Com chave = Claude.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LARA_MODEL: ${LARA_MODEL:-claude-opus-4-8}
    depends_on: [catalog]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [utilar]
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]

  redpanda:
    image: redpandadata/redpanda:v26.1.6
    restart: unless-stopped
    networks: [utilar]
    # Tunado pra caber junto dos serviços numa t3.large (ver docs/aws-build-utilar.md).
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    volumes: [redpanda_data:/var/lib/redpanda/data]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    networks: [utilar]
    ports: ["80:80"]
    volumes:
      - ./deploy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/proxy.inc:/etc/nginx/proxy.inc:ro
    depends_on: [catalog, order, auth, payment, assistant]

networks:
  utilar:

volumes:
  redpanda_data:
