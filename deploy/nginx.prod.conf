# Reverse proxy de produção — 1 nginx roteia por recurso pros 4 serviços Go.
# Todos os VITE_*_URL do SPA apontam pra api.utilarferragem.com.br; o roteamento
# por prefixo de path evita colisão (products/orders/auth/payments são distintos).
#
# TLS é terminado no ALB (Fase 2) ou por certbot na frente (Fase 1). Aqui é :80.

upstream catalog   { server catalog:8091; }
upstream order     { server order:8092; }
upstream auth      { server auth:8093; }
upstream payment   { server payment:8090; }
upstream assistant { server assistant:8094; }

server {
    listen 80;
    server_name _;

    client_max_body_size 4m;   # cobre o import CSV do catálogo (2m) com folga

    # --- Catálogo ---
    location /api/v1/products   { proxy_pass http://catalog; include /etc/nginx/proxy.inc; }
    location /api/v1/categories { proxy_pass http://catalog; include /etc/nginx/proxy.inc; }
    location /api/v1/sellers    { proxy_pass http://catalog; include /etc/nginx/proxy.inc; }
    location /api/v1/admin      { proxy_pass http://catalog; include /etc/nginx/proxy.inc; }

    # --- Pedidos ---
    location /api/v1/orders     { proxy_pass http://order;   include /etc/nginx/proxy.inc; }

    # --- Auth / conta ---
    location /api/v1/auth       { proxy_pass http://auth;    include /etc/nginx/proxy.inc; }
    location /api/v1/me         { proxy_pass http://auth;    include /etc/nginx/proxy.inc; }
    location /api/v1/addresses  { proxy_pass http://auth;    include /etc/nginx/proxy.inc; }

    # --- Pagamentos + webhooks Appmax ---
    location /api/v1/payments   { proxy_pass http://payment; include /etc/nginx/proxy.inc; }
    location /webhooks          { proxy_pass http://payment; include /etc/nginx/proxy.inc; }

    # --- Lara (assistente) ---
    location /api/v1/assistant  { proxy_pass http://assistant; include /etc/nginx/proxy.inc; }

    location = /health { return 200 'ok'; add_header Content-Type text/plain; }
}
